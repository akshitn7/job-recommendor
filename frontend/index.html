<!-- Main entry point of the application. Contains the upload section and results section. 
No page reloads — everything happens on this single page. -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="css/styles.css">

    <title>HireAble</title>
    <script src="js/theme.js"></script>
</head>

<body>

    <!-- navigation bar -->
    <header>
        <nav class="navbar">
            <div class="logo">HireAble</div>
            <ul class="nav-links">
                <li><a href="#">How it works</a></li>
                <li><a href="#">Jobs</a></li>
                <li><a href="#">Skill Gaps</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" title="Toggle light mode">🌙</button>
            <button class="upload-btn">Upload Resume</button>
        </nav>
    </header>
    <!-- headings -->
    <h1 align="center">Your Resume.<br>Your Perfect Role.</h1>
    <p align="center">Upload your resume, explore matching jobs,<br> and discover skills that can help you advance.</p>
    
    <!-- upload section with gradient background -->
    <div class="upload-section">
        <!-- upload box -->
        <div class="upload-box" id="uploadBox">
        <input type="file" id="resumeInput" accept=".pdf,.docx" hidden>
        <p id="uploadText">Drop your Resume here<br> or <span class="browse">Browse File</span></p>
        <small>PDF or DocX • Max size 5MB</small>
        </div>
        <p id="fileName"></p>
    </div>

    <!-- Form to collect primary skill and location -->
    <div class="form-container" id="formContainer" style="display: none;">
        <div class="form-group">
            <label for="primarySkill">Primary Skill</label>
            <input type="text" id="primarySkill" placeholder="e.g., React, Python, Node.js" required>
        </div>

        <div class="form-group">
            <label for="locationSearch">Preferred Locations</label>
            <div class="location-search-container">
                <input type="text" id="locationSearch" placeholder="Search locations...">
                <div class="location-dropdown" id="locationDropdown">
                    <ul id="locationList"></ul>
                </div>
            </div>
            <div class="selected-locations" id="selectedLocations"></div>
        </div>

        <button class="submit-btn" id="submitBtn">Find Matching Jobs</button>
    </div>

    <!-- Results section -->
    <div class="results-container" id="resultsContainer" style="display: none;">
        <h2>Job Matches</h2>
        <div id="jobResults"></div>
    </div>

    <script src="js/location-search.js"></script>
    <script src="js/api.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/results.js"></script>
</body>
</html>
